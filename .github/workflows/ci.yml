name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project
        run: uv sync

      - name: Install Playwright browsers
        # test_interaction_tools.py launches a real Chromium via Playwright.
        # `uv sync` installs the `playwright` Python package but does NOT
        # download the browser binary; without this step the test fails
        # with "Executable doesn't exist at ...".
        run: uv run playwright install --with-deps chromium

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: npx --yes pyright@1.1.410

      - name: Test
        # BROWSER_AGENT_TEST_TIMEOUT caps the real-browser interaction
        # tests (test_interaction_tools.py) so a stuck Chromium launch
        # fails fast instead of blocking the suite for 15+ minutes.
        env:
          BROWSER_AGENT_TEST_TIMEOUT: "120"
        run: uv run pytest
